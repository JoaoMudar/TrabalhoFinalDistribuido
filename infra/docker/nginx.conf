# Configuração do Nginx para servir o frontend (SPA) em produção/K8s (Fase 5).
#
# Faz dois papéis:
#   1. Serve os arquivos estáticos do build do Vite (SPA React).
#   2. Encaminha /api/* para o Service "api" do cluster, removendo o prefixo
#      /api (mesmo comportamento do proxy do Vite em desenvolvimento).
#
# Por que "resolver" + variável no proxy_pass:
#   Se usássemos um host literal em proxy_pass, o Nginx tentaria resolvê-lo no
#   START e falharia caso o Service "api" ainda não existisse (CrashLoop). Usando
#   uma variável + resolver, o Nginx sobe sempre e resolve o nome a cada
#   requisição via DNS do cluster (CoreDNS). O IP do resolver é injetado em
#   tempo de boot pelo entrypoint (docker-nginx-entrypoint.sh), lendo o
#   nameserver do /etc/resolv.conf — portável entre kind/minikube/k3s.

server {
  listen 80;
  server_name _;

  # Resolver do cluster (placeholder trocado pelo entrypoint no boot).
  resolver __DNS_RESOLVER__ valid=10s;

  # ---- API: proxy reverso para o backend ----
  location /api/ {
    # FQDN do Service "api" no namespace "ingressos".
    set $api_upstream "http://api.ingressos.svc.cluster.local:8080";
    # Remove o prefixo /api (ex.: /api/events -> /events).
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ---- SPA: todas as demais rotas caem no index.html (client-side routing) ----
  location / {
    root  /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
