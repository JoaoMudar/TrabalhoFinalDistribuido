# API REST (Fastify) — backend principal (namespace ingressos).
# Sem estado: pode escalar horizontalmente (replicas > 1). Lê a config do
# ConfigMap ingressos-config. A imagem é construída localmente e carregada no
# cluster (ver infra/k8s/README.md); por isso imagePullPolicy: IfNotPresent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ingressos
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # As imagens locais (ingressos/*) são buildadas e importadas SÓ no
      # containerd do master (ver master-body.sh). As workers não têm essas
      # imagens nem docker, então um pod agendado nelas dá ImagePullBackOff.
      # Fixamos os pods de imagem local no nó control-plane (master), onde as
      # imagens existem. (Alternativa "de verdade": publicar no Docker Hub e
      # deixar as workers darem pull — aí este nodeSelector sai.)
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: api
          image: ingressos/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ingressos-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ingressos
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
